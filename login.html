    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #065f46 0%, #059669 50%, #10b981 100%);
            min-height: 100vh;
        }
        .login-box { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }
        .login-btn {
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        .error-shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-12px); }
            40% { transform: translateX(12px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        .hidden { display: none !important; }
        .info-box {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            font-size: 14px;
        }
        /* Maintenance Banner */
.maintenance-banner {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    animation: pulse 2s infinite;
}

.maintenance-banner.hidden {
    display: none !important;
}

.maintenance-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
}

.maintenance-icon {
    font-size: 24px;
}

.maintenance-text {
    font-size: 16px;
}

.maintenance-subtext {
    font-size: 13px;
    opacity: 0.9;
    font-style: italic;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
}
        /* WhatsApp Contact Section */
.whatsapp-contact {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    padding: 14px 22px;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    z-index: 999;
    text-decoration: none;
    border: 2px solid #25D366;
    transition: all 0.3s ease;
}

.whatsapp-contact:hover {
    transform: translateX(-50%) scale(1.03);
    box-shadow: 0 6px 25px rgba(37, 211, 102, 0.3);
}

.whatsapp-contact:active {
    transform: translateX(-50%) scale(0.97);
}

.whatsapp-contact img {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
}

.whatsapp-contact .whatsapp-text {
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #065f46;
    white-space: nowrap;
}

.whatsapp-contact .whatsapp-sub {
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #6b7280;
    white-space: nowrap;
}

/* Pulse animation */
@keyframes whatsapp-pulse {
    0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
    70% { box-shadow: 0 0 0 18px rgba(37, 211, 102, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}

.whatsapp-contact {
    animation: whatsapp-pulse 2.5s infinite;
}
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <div class="login-box w-full max-w-md">

        const SUPABASE_URL = "https://dklyyzbnapkxlluximzk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrbHl5emJuYXBreGxsdXhpbXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjEwMDIsImV4cCI6MjA5MTgzNzAwMn0.qpCqvUTia4ywEMPSYJ_rIB4pSlk0zkvq5cQa-sFaFEs";

        const SECTION_DISPLAY = {
            'highschool': 'المرحلة الثانوية',
            'middleschool': 'المرحلة المتوسطة',
            'elementary': 'المرحلة الابتدائية'

        function togglePassword() {
            const pass = document.getElementById('password');
            const eye = document.getElementById('eyeIcon');
            if (pass.type === 'password') {
                pass.type = 'text';
                eye.textContent = '🔓';
            } else {
                pass.type = 'password';
                eye.textContent = '👁️';
            }
        }

        // CONSISTENT HASH FUNCTION
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const form = document.getElementById('loginForm');
            const loginBtn = document.querySelector('.login-btn');
            
            loginBtn.textContent = '⏳ جاري التحقق...';
            loginBtn.disabled = true;
            
            try {
                const hashedPassword = hashPassword(password);
                
                // Check BOTH tables: masjid_users (teachers) AND section_users (sections)
                const [teacherResponse, sectionResponse] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/masjid_users?username=eq.${encodeURIComponent(username)}&select=*`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }),
                    fetch(`${SUPABASE_URL}/rest/v1/section_users?username=eq.${encodeURIComponent(username)}&select=*`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    })
                ]);
                
                const teachers = await teacherResponse.json();
                const sections = await sectionResponse.json();
                
                // Check teacher accounts first
                if (teachers && teachers.length > 0) {
                    const user = teachers[0];
                    
                    if (user.password_hash === hashedPassword) {
                        const sessionData = {
                            username: user.username,
                            displayName: user.display_name,
                            loginTime: new Date().toISOString(),
                            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
                        };
                        
                        sessionStorage.setItem('quranTrackerSession', JSON.stringify(sessionData));
                        window.location.href = 'index.html';
                        return false;
                    }
                }
                
                // Check section accounts
                if (sections && sections.length > 0) {
                    const section = sections[0];
                    
                    if (section.password_hash === hashedPassword) {
                        const sessionData = {
                            section: section.section_name,
                            displayName: SECTION_DISPLAY[section.section_name] || section.section_name,
                            loginTime: new Date().toISOString(),
                            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
                        };
                        
                        sessionStorage.setItem('viewSectionSession', JSON.stringify(sessionData));
                        window.location.href = 'view.html';
                        return false;
                    }
                }
                
                // If we get here, no match found
                showError('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
                
            } catch (e) {
                console.error('Login error:', e);
                showError('❌ خطأ في الاتصال. حاول مرة أخرى.');
            }
            
            loginBtn.textContent = '🚪 دخول';
            loginBtn.disabled = false;
            
            function showError(msg) {
                errorDiv.textContent = msg;
                errorDiv.classList.remove('hidden');
                form.classList.add('error-shake');
                setTimeout(() => form.classList.remove('error-shake'), 500);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
            
            return false;
        }

        (function checkSession() {
            const teacherSession = sessionStorage.getItem('quranTrackerSession');
            const viewSession = sessionStorage.getItem('viewSectionSession');
            
            if (teacherSession) {
                try {
                    const data = JSON.parse(teacherSession);
                    if (new Date(data.expiresAt) > new Date()) {
                        window.location.href = 'index.html';
                    }
                } catch (e) {}
            }
            
            if (viewSession) {
                try {
                    const data = JSON.parse(viewSession);
                    if (new Date(data.expiresAt) > new Date()) {
                        window.location.href = 'view.html';
                    }
                } catch (e) {}
            }
        })();

        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorMessage').classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMessage').classList.add('hidden');
        });
    </script>

</body>
