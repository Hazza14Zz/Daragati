<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سجل متابعة الحلقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #065f46 0%, #059669 50%, #10b981 100%);
            min-height: 100vh;
        }
        .login-box { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }
        .login-btn {
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        .error-shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-12px); }
            40% { transform: translateX(12px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        .hidden { display: none !important; }
        .info-box {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <div class="login-box w-full max-w-md">
        
        <div class="text-center mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-2xl inline-block">
                <span class="text-6xl">📖</span>
            </div>
            <h1 class="text-4xl font-bold text-white mt-5 drop-shadow-lg">سجل متابعة القرآن</h1>
            <p class="text-emerald-100 mt-2 text-lg">الرجاء تسجيل الدخول للمتابعة</p>
        </div>

        <div class="info-box">
            <p>👨‍🏫 المعلمين: اسم المستخدم وكلمة المرور الخاصة بكم</p>
            <p>🏫 المراحل: highschool / middleschool / elementary</p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <form id="loginForm" onsubmit="return handleLogin(event)">
                
                <div class="mb-6">
                    <label class="block text-gray-800 font-bold mb-3 text-right text-lg">
                        👤 اسم المستخدم
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="أدخل اسم المستخدم"
                        class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none text-right text-lg"
                        required
                        autocomplete="off"
                        dir="rtl"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-gray-800 font-bold mb-3 text-right text-lg">
                        🔑 كلمة المرور
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="أدخل كلمة المرور"
                            class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none text-right text-lg"
                            required
                            dir="rtl"
                        >
                        <button 
                            type="button"
                            onclick="togglePassword()"
                            class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-emerald-600 text-2xl"
                        >
                            <span id="eyeIcon">👁️</span>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="hidden bg-red-50 border-2 border-red-300 text-red-700 px-5 py-4 rounded-2xl mb-5 text-center text-md font-bold">
                    ❌ اسم المستخدم أو كلمة المرور غير صحيحة
                </div>

                <button type="submit" class="login-btn w-full bg-gradient-to-r from-emerald-600 to-emerald-700 text-white font-bold py-4 px-6 rounded-2xl hover:from-emerald-700 hover:to-emerald-800 transition text-xl shadow-lg">
                    🚪 دخول
                </button>
                
            </form>

            <div class="mt-8 text-center text-gray-400 text-sm">
                <p>🔒 مخصص للمشرفين والمعلمين والمراحل فقط</p>
            </div>
        </div>
        
    </div>

    <script>
        const SUPABASE_URL = "https://dklyyzbnapkxlluximzk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrbHl5emJuYXBreGxsdXhpbXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjEwMDIsImV4cCI6MjA5MTgzNzAwMn0.qpCqvUTia4ywEMPSYJ_rIB4pSlk0zkvq5cQa-sFaFEs";

        // Section display names
        const SECTION_DISPLAY = {
            'highschool': 'المرحلة الثانوية',
            'middleschool': 'المرحلة المتوسطة',
            'elementary': 'المرحلة الابتدائية'
        };

        function togglePassword() {
            const pass = document.getElementById('password');
            const eye = document.getElementById('eyeIcon');
            if (pass.type === 'password') {
                pass.type = 'text';
                eye.textContent = '🔓';
            } else {
                pass.type = 'password';
                eye.textContent = '👁️';
            }
        }

        // CONSISTENT HASH FUNCTION
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const form = document.getElementById('loginForm');
            const loginBtn = document.querySelector('.login-btn');
            
            loginBtn.textContent = '⏳ جاري التحقق...';
            loginBtn.disabled = true;
            
            try {
                const hashedPassword = hashPassword(password);
                
                // Check BOTH tables: masjid_users (teachers) AND section_users (sections)
                const [teacherResponse, sectionResponse] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/masjid_users?username=eq.${encodeURIComponent(username)}&select=*`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }),
                    fetch(`${SUPABASE_URL}/rest/v1/section_users?username=eq.${encodeURIComponent(username)}&select=*`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    })
                ]);
                
                const teachers = await teacherResponse.json();
                const sections = await sectionResponse.json();
                
                // Check teacher accounts first
                if (teachers && teachers.length > 0) {
                    const user = teachers[0];
                    
                    if (user.password_hash === hashedPassword) {
                        const sessionData = {
                            username: user.username,
                            displayName: user.display_name,
                            loginTime: new Date().toISOString(),
                            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
                        };
                        
                        sessionStorage.setItem('quranTrackerSession', JSON.stringify(sessionData));
                        window.location.href = 'index.html';
                        return false;
                    }
                }
                
                // Check section accounts
                if (sections && sections.length > 0) {
                    const section = sections[0];
                    
                    if (section.password_hash === hashedPassword) {
                        const sessionData = {
                            section: section.section_name,
                            displayName: SECTION_DISPLAY[section.section_name] || section.section_name,
                            loginTime: new Date().toISOString(),
                            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
                        };
                        
                        sessionStorage.setItem('viewSectionSession', JSON.stringify(sessionData));
                        window.location.href = 'view.html';
                        return false;
                    }
                }
                
                // If we get here, no match found
                showError('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
                
            } catch (e) {
                console.error('Login error:', e);
                showError('❌ خطأ في الاتصال. حاول مرة أخرى.');
            }
            
            loginBtn.textContent = '🚪 دخول';
            loginBtn.disabled = false;
            
            function showError(msg) {
                errorDiv.textContent = msg;
                errorDiv.classList.remove('hidden');
                form.classList.add('error-shake');
                setTimeout(() => form.classList.remove('error-shake'), 500);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
            
            return false;
        }

        (function checkSession() {
            const teacherSession = sessionStorage.getItem('quranTrackerSession');
            const viewSession = sessionStorage.getItem('viewSectionSession');
            
            if (teacherSession) {
                try {
                    const data = JSON.parse(teacherSession);
                    if (new Date(data.expiresAt) > new Date()) {
                        window.location.href = 'index.html';
                    }
                } catch (e) {}
            }
            
            if (viewSession) {
                try {
                    const data = JSON.parse(viewSession);
                    if (new Date(data.expiresAt) > new Date()) {
                        window.location.href = 'view.html';
                    }
                } catch (e) {}
            }
        })();

        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorMessage').classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMessage').classList.add('hidden');
        });
    </script>

</body>
</html>
