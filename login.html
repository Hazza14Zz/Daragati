<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سجل متابعة الحلقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center p-4" style="font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #065f46 0%, #059669 50%, #10b981 100%); min-height: 100vh;">

    <div class="w-full max-w-md">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-2xl inline-block">
                <span class="text-6xl">📖</span>
            </div>
            <h1 class="text-4xl font-bold text-white mt-5 drop-shadow-lg">سجل متابعة القرآن</h1>
            <p class="text-emerald-100 mt-2 text-lg">الرجاء تسجيل الدخول للمتابعة</p>
        </div>

        <!-- Login Form Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <form id="loginForm" onsubmit="return handleLogin(event)">
                
                <!-- Username Field -->
                <div class="mb-6">
                    <label class="block text-gray-800 font-bold mb-3 text-right text-lg">
                        👤 اسم المستخدم
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="أدخل اسم المستخدم"
                        class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none text-right text-lg"
                        required
                        autocomplete="off"
                        dir="rtl"
                    >
                </div>

                <!-- Password Field -->
                <div class="mb-6">
                    <label class="block text-gray-800 font-bold mb-3 text-right text-lg">
                        🔑 كلمة المرور
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="أدخل كلمة المرور"
                            class="w-full px-5 py-4 border-2 border-gray-200 rounded-2xl focus:border-emerald-500 focus:outline-none text-right text-lg"
                            required
                            dir="rtl"
                        >
                        <button 
                            type="button"
                            onclick="togglePassword()"
                            class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-emerald-600 text-2xl"
                        >
                            <span id="eyeIcon">👁️</span>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden bg-red-50 border-2 border-red-300 text-red-700 px-5 py-4 rounded-2xl mb-5 text-center text-md font-bold">
                    ❌ اسم المستخدم أو كلمة المرور غير صحيحة
                </div>

                <!-- Login Button -->
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-emerald-600 to-emerald-700 text-white font-bold py-4 px-6 rounded-2xl hover:from-emerald-700 hover:to-emerald-800 transition text-xl shadow-lg"
                >
                    🚪 دخول
                </button>
                
            </form>

            <!-- Footer -->
            <div class="mt-8 text-center text-gray-400 text-sm">
                <p>🔒 مخصص للمشرفين والمعلمين فقط</p>
            </div>
        </div>
        
    </div>

    <script>
        // Authorized Users
        const AUTHORIZED_USERS = [
            { username: "Mohamed.A2312", password: "Mohamed1234@@", displayName: "محمد" },
            { username: "Maher.2313", password: "Maher1414$$", displayName: "ماهر" },
            { username: "Motaz.2314", password: "Motaz1212!!", displayName: "معتز" }
        ];

        function togglePassword() {
            const pass = document.getElementById('password');
            const eye = document.getElementById('eyeIcon');
            if (pass.type === 'password') {
                pass.type = 'text';
                eye.textContent = '🔓';
            } else {
                pass.type = 'password';
                eye.textContent = '👁️';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const form = document.getElementById('loginForm');
            
            const user = AUTHORIZED_USERS.find(u => u.username === username && u.password === password);
            
            if (user) {
                const sessionData = {
                    username: user.username,
                    displayName: user.displayName,
                    loginTime: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
                };
                sessionStorage.setItem('quranTrackerSession', JSON.stringify(sessionData));
                window.location.href = 'index.html';
            } else {
                errorDiv.classList.remove('hidden');
                form.classList.add('error-shake');
                setTimeout(() => form.classList.remove('error-shake'), 500);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
            return false;
        }

        // Check existing session
        (function checkSession() {
            const session = sessionStorage.getItem('quranTrackerSession');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (new Date(data.expiresAt) > new Date()) {
                        window.location.href = 'index.html';
                    } else {
                        sessionStorage.removeItem('quranTrackerSession');
                    }
                } catch (e) {
                    sessionStorage.removeItem('quranTrackerSession');
                }
            }
        })();

        // Clear error on typing
        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorMessage').classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMessage').classList.add('hidden');
        });
    </script>

    <style>
        .error-shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-12px); }
            40% { transform: translateX(12px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
    </style>

</body>
</html>
